# Cloud Build configuration for ListyGifty
# Builds and deploys the Rails API to Cloud Run

substitutions:
  _REGION: 'us-central1'
  _SERVICE_NAME: 'listygifty-api'
  _SERVICE_NAME_STAGING: 'listygifty-api-staging'

steps:
  # Step 1: Build Docker image
  - id: 'build'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/listygifty/${_SERVICE_NAME}:$COMMIT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/listygifty/${_SERVICE_NAME}:latest'
      - '-f'
      - 'apps/api/Dockerfile'
      - 'apps/api'
    waitFor: ['-']

  # Step 2: Push to Artifact Registry
  - id: 'push'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/listygifty/${_SERVICE_NAME}:$COMMIT_SHA'
    waitFor: ['build']

  - id: 'push-latest'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/listygifty/${_SERVICE_NAME}:latest'
    waitFor: ['build']

  # Step 3: Deploy to Staging
  - id: 'deploy-staging'
    name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME_STAGING}'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/listygifty/${_SERVICE_NAME}:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--cpu=1'
      - '--memory=512Mi'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--timeout=300'
      - '--set-env-vars=RAILS_ENV=staging'
      - '--set-secrets=DATABASE_URL=listygifty-db-staging:latest'
      - '--set-secrets=RAILS_MASTER_KEY=listygifty-rails-key-staging:latest'
      - '--set-secrets=CLERK_SECRET_KEY=listygifty-clerk-key-staging:latest'
    waitFor: ['push']

  # Step 4: Deploy to Production (manual approval via separate trigger)
  # This step is commented out - use a separate trigger for production deploys
  # - id: 'deploy-production'
  #   name: 'gcr.io/cloud-builders/gcloud'
  #   args:
  #     - 'run'
  #     - 'deploy'
  #     - '${_SERVICE_NAME}'
  #     - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/listygifty/${_SERVICE_NAME}:$COMMIT_SHA'
  #     - '--region=${_REGION}'
  #     - '--platform=managed'
  #     - '--allow-unauthenticated'
  #     - '--cpu=2'
  #     - '--memory=1Gi'
  #     - '--min-instances=1'
  #     - '--max-instances=20'
  #     - '--timeout=300'
  #     - '--set-env-vars=RAILS_ENV=production'
  #     - '--set-secrets=DATABASE_URL=listygifty-db-prod:latest'
  #     - '--set-secrets=RAILS_MASTER_KEY=listygifty-rails-key-prod:latest'
  #     - '--set-secrets=CLERK_SECRET_KEY=listygifty-clerk-key-prod:latest'
  #   waitFor: ['push']

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/listygifty/${_SERVICE_NAME}:$COMMIT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/listygifty/${_SERVICE_NAME}:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1800s'
