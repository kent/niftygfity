# Cloud Build configuration for Production deployment
# Triggered manually or via release tag

substitutions:
  _REGION: 'us-central1'
  _SERVICE_NAME: 'listygifty-api'

steps:
  # Step 1: Deploy to Production
  - id: 'deploy-production'
    name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/listygifty/${_SERVICE_NAME}:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--cpu=2'
      - '--memory=1Gi'
      - '--min-instances=1'
      - '--max-instances=20'
      - '--concurrency=100'
      - '--timeout=300'
      - '--set-env-vars=RAILS_ENV=production,API_BASE_URL=https://api.listygifty.com,MCP_SERVER_URI=https://api.listygifty.com/mcp,FRONTEND_URL=https://listygifty.com'
      - '--set-secrets=DATABASE_URL=listygifty-db-prod:latest,RAILS_MASTER_KEY=listygifty-rails-key-prod:latest,CLERK_SECRET_KEY=listygifty-clerk-key-prod:latest,STRIPE_SECRET_KEY=listygifty-stripe-key-prod:latest,POSTMARK_API_KEY=listygifty-postmark-key-prod:latest,OPENAI_API_KEY=listygifty-openai-key-prod:latest,POSTHOG_API_KEY=listygifty-posthog-key-prod:latest'

  # Step 2: Run database migrations
  - id: 'run-migrations'
    name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run jobs execute listygifty-migrate-prod \
          --region=${_REGION} \
          --wait
    waitFor: ['deploy-production']

  # Step 3: Run health check
  - id: 'health-check'
    name: 'gcr.io/cloud-builders/curl'
    args:
      - '-f'
      - 'https://api.listygifty.com/up'
    waitFor: ['run-migrations']

options:
  logging: CLOUD_LOGGING_ONLY

timeout: '1800s'
