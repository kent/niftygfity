name: Deploy Web

on:
  push:
    branches:
      - main
      - staging
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-web.yml'

env:
  PROJECT_ID: listygifty
  REGION: us-central1
  IMAGE: gcr.io/listygifty/listygifty-web

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set environment variables
        id: env
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "ENV=production" >> $GITHUB_OUTPUT
            echo "SERVICE_NAME=listygifty-web-prod" >> $GITHUB_OUTPUT
            echo "API_URL=https://api.listygifty.com" >> $GITHUB_OUTPUT
            echo "APP_URL=https://listygifty.com" >> $GITHUB_OUTPUT
            echo "CLERK_KEY=${{ secrets.CLERK_PUBLISHABLE_KEY_PROD }}" >> $GITHUB_OUTPUT
          else
            echo "ENV=staging" >> $GITHUB_OUTPUT
            echo "SERVICE_NAME=listygifty-web-staging" >> $GITHUB_OUTPUT
            echo "API_URL=https://api-staging.listygifty.com" >> $GITHUB_OUTPUT
            echo "APP_URL=https://staging.listygifty.com" >> $GITHUB_OUTPUT
            echo "CLERK_KEY=${{ secrets.CLERK_PUBLISHABLE_KEY_STAGING }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:${{ steps.env.outputs.ENV }}
            ${{ env.IMAGE }}:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ steps.env.outputs.API_URL }}
            NEXT_PUBLIC_APP_URL=${{ steps.env.outputs.APP_URL }}
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ steps.env.outputs.CLERK_KEY }}
            NEXT_PUBLIC_CLERK_SIGN_IN_URL=/login
            NEXT_PUBLIC_CLERK_SIGN_UP_URL=/signup
            NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL=/dashboard
            NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL=/dashboard
            NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.POSTHOG_KEY }}
            NEXT_PUBLIC_POSTHOG_HOST=${{ secrets.POSTHOG_HOST }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ steps.env.outputs.SERVICE_NAME }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --no-cpu-throttling

      - name: Show deployment URL
        run: |
          URL=$(gcloud run services describe ${{ steps.env.outputs.SERVICE_NAME }} --region=${{ env.REGION }} --format='value(status.url)')
          echo "## 🚀 Deployed Web to ${{ steps.env.outputs.ENV }}" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** $URL" >> $GITHUB_STEP_SUMMARY
