name: Deploy Web

on:
  push:
    branches:
      - main
      - staging
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-web.yml'

env:
  PROJECT_ID: listygifty
  REGION: us-east1
  SERVICE_NAME: niftygifty-web
  IMAGE: gcr.io/listygifty/niftygifty-web

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Set environment variables
        id: env
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "ENV=production" >> $GITHUB_OUTPUT
            echo "API_URL=https://api.listygifty.com" >> $GITHUB_OUTPUT
            echo "APP_URL=https://listygifty.com" >> $GITHUB_OUTPUT
            echo "CLERK_KEY=${{ secrets.CLERK_PUBLISHABLE_KEY_PROD }}" >> $GITHUB_OUTPUT
          else
            echo "ENV=staging" >> $GITHUB_OUTPUT
            echo "API_URL=https://api-staging.listygifty.com" >> $GITHUB_OUTPUT
            echo "APP_URL=https://staging.listygifty.com" >> $GITHUB_OUTPUT
            echo "CLERK_KEY=${{ secrets.CLERK_PUBLISHABLE_KEY_STAGING }}" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image
        run: |
          docker build \
            -f apps/web/Dockerfile \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:${{ steps.env.outputs.ENV }} \
            --build-arg NEXT_PUBLIC_API_URL=${{ steps.env.outputs.API_URL }} \
            --build-arg NEXT_PUBLIC_APP_URL=${{ steps.env.outputs.APP_URL }} \
            --build-arg NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ steps.env.outputs.CLERK_KEY }} \
            --build-arg NEXT_PUBLIC_CLERK_SIGN_IN_URL=/login \
            --build-arg NEXT_PUBLIC_CLERK_SIGN_UP_URL=/signup \
            --build-arg NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL=/dashboard \
            --build-arg NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL=/dashboard \
            --build-arg NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.POSTHOG_KEY }} \
            --build-arg NEXT_PUBLIC_POSTHOG_HOST=${{ secrets.POSTHOG_HOST }} \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:${{ steps.env.outputs.ENV }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10

      - name: Show deployment URL
        run: |
          echo "Deployed to: $(gcloud run services describe ${{ env.SERVICE_NAME }} --region=${{ env.REGION }} --format='value(status.url)')"
