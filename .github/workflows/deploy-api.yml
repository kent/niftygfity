name: Deploy API

on:
  push:
    branches:
      - main
      - staging
    paths:
      - 'apps/api/**'
      - '.github/workflows/deploy-api.yml'

env:
  PROJECT_ID: listygifty
  IMAGE: gcr.io/listygifty/niftygifty-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set environment variables
        id: env
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "ENV=production" >> $GITHUB_OUTPUT
            echo "SERVICE_NAME=listygifty-api-prod" >> $GITHUB_OUTPUT
            echo "REGION=us-central1" >> $GITHUB_OUTPUT
            echo "RAILS_ENV=production" >> $GITHUB_OUTPUT
            echo "CLOUD_SQL_INSTANCE=listygifty:us-central1:niftygifty-postgres-central" >> $GITHUB_OUTPUT
            echo "ALLOWED_HOSTS_SECRET=niftygifty-allowed-hosts" >> $GITHUB_OUTPUT
            echo "SECRET_KEY_SECRET=listygifty-rails-key-prod" >> $GITHUB_OUTPUT
            echo "CLERK_SECRET=niftygifty-clerk-secret-key" >> $GITHUB_OUTPUT
            echo "STRIPE_SECRET=niftygifty-stripe-secret-key" >> $GITHUB_OUTPUT
            echo "STRIPE_WEBHOOK_SECRET=niftygifty-stripe-webhook-secret" >> $GITHUB_OUTPUT
            echo "POSTMARK_SECRET=niftygifty-postmark-api-token" >> $GITHUB_OUTPUT
            echo "OPENAI_SECRET=niftygifty-openai-api-key" >> $GITHUB_OUTPUT
            echo "DATABASE_URL_SECRET=niftygifty-database-url" >> $GITHUB_OUTPUT
            echo "CORS_ORIGINS_SECRET=niftygifty-cors-origins" >> $GITHUB_OUTPUT
            echo "FRONTEND_URL_SECRET=niftygifty-frontend-url" >> $GITHUB_OUTPUT
          else
            echo "ENV=staging" >> $GITHUB_OUTPUT
            echo "SERVICE_NAME=listygifty-api-staging" >> $GITHUB_OUTPUT
            echo "REGION=us-central1" >> $GITHUB_OUTPUT
            echo "RAILS_ENV=staging" >> $GITHUB_OUTPUT
            echo "CLOUD_SQL_INSTANCE=listygifty:us-central1:niftygifty-postgres-central" >> $GITHUB_OUTPUT
            echo "ALLOWED_HOSTS_SECRET=niftygifty-staging-allowed-hosts" >> $GITHUB_OUTPUT
            echo "SECRET_KEY_SECRET=listygifty-rails-key-staging" >> $GITHUB_OUTPUT
            echo "CLERK_SECRET=niftygifty-staging-clerk-secret-key" >> $GITHUB_OUTPUT
            echo "STRIPE_SECRET=niftygifty-staging-stripe-secret-key" >> $GITHUB_OUTPUT
            echo "STRIPE_WEBHOOK_SECRET=niftygifty-staging-stripe-webhook-secret" >> $GITHUB_OUTPUT
            echo "POSTMARK_SECRET=niftygifty-staging-postmark-api-token" >> $GITHUB_OUTPUT
            echo "OPENAI_SECRET=niftygifty-staging-openai-api-key" >> $GITHUB_OUTPUT
            echo "DATABASE_URL_SECRET=niftygifty-staging-database-url" >> $GITHUB_OUTPUT
            echo "CORS_ORIGINS_SECRET=niftygifty-staging-cors-origins" >> $GITHUB_OUTPUT
            echo "FRONTEND_URL_SECRET=niftygifty-staging-frontend-url" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: apps/api
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:${{ steps.env.outputs.ENV }}
            ${{ env.IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ steps.env.outputs.SERVICE_NAME }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ steps.env.outputs.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=3000 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --no-cpu-throttling \
            --set-cloudsql-instances=${{ steps.env.outputs.CLOUD_SQL_INSTANCE }} \
            --set-env-vars="RAILS_ENV=${{ steps.env.outputs.RAILS_ENV }}" \
            --set-secrets="DATABASE_URL=${{ steps.env.outputs.DATABASE_URL_SECRET }}:latest,SECRET_KEY_BASE=${{ steps.env.outputs.SECRET_KEY_SECRET }}:latest,ALLOWED_HOSTS=${{ steps.env.outputs.ALLOWED_HOSTS_SECRET }}:latest,CLERK_SECRET_KEY=${{ steps.env.outputs.CLERK_SECRET }}:latest,STRIPE_SECRET_KEY=${{ steps.env.outputs.STRIPE_SECRET }}:latest,STRIPE_WEBHOOK_SECRET=${{ steps.env.outputs.STRIPE_WEBHOOK_SECRET }}:latest,POSTMARK_API_KEY=${{ steps.env.outputs.POSTMARK_SECRET }}:latest,OPENAI_API_KEY=${{ steps.env.outputs.OPENAI_SECRET }}:latest,CORS_ORIGINS=${{ steps.env.outputs.CORS_ORIGINS_SECRET }}:latest,FRONTEND_URL=${{ steps.env.outputs.FRONTEND_URL_SECRET }}:latest"

      - name: Run database migrations
        run: |
          gcloud run jobs execute migrate-${{ steps.env.outputs.ENV }} \
            --region=${{ steps.env.outputs.REGION }} \
            --wait \
            || echo "Migration job not found, skipping"

      - name: Show deployment URL
        run: |
          URL=$(gcloud run services describe ${{ steps.env.outputs.SERVICE_NAME }} --region=${{ steps.env.outputs.REGION }} --format='value(status.url)')
          echo "## 🚀 Deployed API to ${{ steps.env.outputs.ENV }}" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** $URL" >> $GITHUB_STEP_SUMMARY
